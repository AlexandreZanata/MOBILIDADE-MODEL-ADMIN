name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_MOCK_MODE: "true"
  NEXT_PUBLIC_API_URL: ""

jobs:
  # ─── Quality Gate (all checks in one job for fast PR feedback) ──────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --project tsconfig.src.json

      - name: ESLint
        run: npx eslint src next.config.ts vitest.config.ts --max-warnings 0

      - name: Tests
        run: npx vitest --run

      - name: Build check
        run: npm run build
